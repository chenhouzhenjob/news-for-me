name: AI Daily Report

on:
  schedule:
    # 00:00 UTC is 08:00 in Asia/Shanghai.
    - cron: "0 0 * * *"
  workflow_dispatch:
    inputs:
      report_date:
        description: "Optional report date in Asia/Shanghai, YYYY-MM-DD"
        required: false
        type: string

jobs:
  send-report:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      SMTP_FROM: ${{ secrets.SMTP_FROM }}
      RECIPIENT_EMAIL: ${{ secrets.EMAIL_TO || vars.RECIPIENT_EMAIL }}
      TIMEZONE: ${{ vars.TIMEZONE || 'Asia/Shanghai' }}
      AI_MAX_ITEMS: ${{ vars.AI_MAX_ITEMS || '12' }}
      AI_FETCH_ARTICLE_IMAGES: ${{ vars.AI_FETCH_ARTICLE_IMAGES || 'true' }}
      GITHUB_TOKEN: ${{ github.token }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run AI daily report
        run: |
          if [ -n "${{ inputs.report_date }}" ]; then
            python3 ai_daily_report.py --date "${{ inputs.report_date }}"
          else
            python3 ai_daily_report.py
          fi
